name: spicy
description: "AlienHouse Dating App - Find your connection."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0

  # Navigation
  go_router: ^14.2.7

  # State Management
  flutter_riverpod: ^2.5.1

  # HTTP Client
  dio: ^5.4.3

  # Secure Storage (JWT tokens)
  flutter_secure_storage: ^9.2.2

  # Image loading
  cached_network_image: ^3.3.1

  # Image picker for profile photo
  image_picker: ^1.1.2

  # Device info for device_id
  device_info_plus: ^10.1.0

  # UUID
  uuid: ^4.4.2

  # Intl for date formatting
  intl: ^0.19.0

  # Device location
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
