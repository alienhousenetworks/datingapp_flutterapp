openapi: 3.0.3
info:
  title: Dating App Platform API
  version: 1.0.0
  description: Production API for real-time dating application.
paths:
  /api/v1/analytics/dashboard/:
    get:
      operationId: analytics_dashboard_retrieve
      tags:
      - analytics
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: Requires a valid refresh token in the body. Blacklists it to prevent
        further access token generation.
      summary: Logout by blacklisting refresh token
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMessageResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
          description: ''
  /api/v1/auth/otp/resend/:
    post:
      operationId: auth_otp_resend_create
      description: Resends the OTP to the previously used email if the rate limit
        cooldown has expired.
      summary: Resend OTP
      tags:
      - auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMessageResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
          description: ''
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRateLimitResponse'
          description: ''
  /api/v1/auth/otp/verify/:
    post:
      operationId: auth_otp_verify_create
      description: Verifies the previously requested OTP. Returns JWT access/refresh
        tokens alongside basic user identity data upon success.
      summary: Verify OTP to receive tokens
      tags:
      - auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      description: Sends a 6-digit OTP to the provided email address. If the user
        doesn't exist, they are conceptually registered.
      summary: Request OTP for login/registration
      tags:
      - auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMessageResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
          description: ''
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRateLimitResponse'
          description: ''
  /api/v1/auth/ws-ticket/:
    post:
      operationId: auth_ws_ticket_create
      description: Generates a short-lived (30s), single-use ticket for authenticating
        WebSocket connections without exposing JWTs in the query string.
      summary: Generate WebSocket Auth Ticket
      tags:
      - auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
